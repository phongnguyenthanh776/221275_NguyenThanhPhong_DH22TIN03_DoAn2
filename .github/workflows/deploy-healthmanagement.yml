name: Deploy HealthManagement Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - HealthManagement/**
      - .github/workflows/deploy-healthmanagement.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout only web project
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            HealthManagement
          sparse-checkout-cone-mode: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HealthManagement/HealthManagement.csproj

      - name: Build
        run: dotnet build HealthManagement/HealthManagement.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish HealthManagement/HealthManagement.csproj --configuration Release --output publish --no-build

      - name: Deploy to Azure Web App via FTPS
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail

          if [ ! -d publish ]; then
            echo "Publish output folder is missing."
            exit 1
          fi

          sudo apt-get update -y >/dev/null
          sudo apt-get install -y lftp >/dev/null

          PARSED_FTP=$(python3 - <<'PY'
          import base64
          import os
          import sys
          import xml.etree.ElementTree as ET

          xml_text = os.environ.get("PUBLISH_PROFILE", "").strip()
          if not xml_text:
              print("PUBLISH_PROFILE secret is empty.", file=sys.stderr)
              sys.exit(1)

          try:
              root = ET.fromstring(xml_text)
          except ET.ParseError as exc:
              print(f"Invalid publish profile XML: {exc}", file=sys.stderr)
              sys.exit(1)

          ftp_profile = None
          for profile in root.findall('.//publishProfile'):
              method = profile.attrib.get('publishMethod', '').lower()
              name = profile.attrib.get('profileName', '').lower()
              if method == 'ftp' and 'readonly' not in name:
                  ftp_profile = profile
                  break

          if ftp_profile is None:
              print("No writable FTP profile found in publish profile.", file=sys.stderr)
              sys.exit(1)

          publish_url = ftp_profile.attrib.get('publishUrl', '')
          username = ftp_profile.attrib.get('userName', '')
          password = ftp_profile.attrib.get('userPWD', '')

          if not publish_url or not username or not password:
              print("FTP profile missing publishUrl/userName/userPWD.", file=sys.stderr)
              sys.exit(1)

          url = publish_url
          for prefix in ('ftps://', 'ftp://'):
              if url.startswith(prefix):
                  url = url[len(prefix):]
                  break

          host, sep, path = url.partition('/')
          if not host:
              print("FTP host is empty.", file=sys.stderr)
              sys.exit(1)
          if not sep:
              path = 'site/wwwroot'

          def b64(s: str) -> str:
              return base64.b64encode(s.encode('utf-8')).decode('ascii')

          print(b64(host))
          print(b64(path))
          print(b64(username))
          print(b64(password))
          print(f"FTPS target: {host}/{path}", file=sys.stderr)
          PY
          )

          readarray -t FTP_LINES <<< "$PARSED_FTP"
          if [ "${#FTP_LINES[@]}" -lt 4 ]; then
            echo "Failed to parse FTP credentials from publish profile."
            exit 1
          fi

          FTP_HOST=$(printf '%s' "${FTP_LINES[0]}" | base64 -d)
          FTP_PATH=$(printf '%s' "${FTP_LINES[1]}" | base64 -d)
          FTP_USER=$(printf '%s' "${FTP_LINES[2]}" | base64 -d)
          FTP_PASS=$(printf '%s' "${FTP_LINES[3]}" | base64 -d)

          FTP_TARGET_URL="ftps://${FTP_HOST}/${FTP_PATH#/}"
          echo "Deploying publish/ to ${FTP_TARGET_URL}"

          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_TARGET_URL" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set net:max-retries 2
          set net:reconnect-interval-base 5
          mirror -R --verbose publish .
          bye
          EOF

          echo "FTPS deployment completed."