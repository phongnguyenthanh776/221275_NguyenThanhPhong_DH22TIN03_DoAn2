name: Deploy HealthManagement Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - HealthManagement/**
      - .github/workflows/deploy-healthmanagement.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout only web project
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            HealthManagement
          sparse-checkout-cone-mode: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HealthManagement/HealthManagement.csproj

      - name: Build
        run: dotnet build HealthManagement/HealthManagement.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish HealthManagement/HealthManagement.csproj --configuration Release --output publish --no-build

      - name: Deploy to Azure Web App via Kudu ZipDeploy
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail
          command -v zip >/dev/null 2>&1 || { echo "zip command is not available on runner"; exit 1; }

          # Parse ZipDeploy credentials from publish profile XML.
          python3 - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          xml_text = os.environ.get("PUBLISH_PROFILE", "").strip()
          if not xml_text:
              print("PUBLISH_PROFILE secret is empty.", file=sys.stderr)
              sys.exit(1)

          try:
              root = ET.fromstring(xml_text)
          except ET.ParseError as exc:
              print(f"Invalid publish profile XML: {exc}", file=sys.stderr)
              sys.exit(1)

          zip_profile = None
          for profile in root.findall('.//publishProfile'):
              method = profile.attrib.get('publishMethod', '').lower()
              if method == 'zipdeploy':
                  zip_profile = profile
                  break

          if zip_profile is None:
              print("No ZipDeploy profile found in publish profile.", file=sys.stderr)
              sys.exit(1)

          publish_url = zip_profile.attrib.get('publishUrl', '').replace(':443', '')
          username = zip_profile.attrib.get('userName', '')
          password = zip_profile.attrib.get('userPWD', '')

          if not publish_url or not username or not password:
              print("ZipDeploy profile is missing publishUrl/userName/userPWD.", file=sys.stderr)
              sys.exit(1)

          def sh_single_quote(value: str) -> str:
              return "'" + value.replace("'", "'\"'\"'") + "'"

          with open('kudu_env.sh', 'w', encoding='utf-8') as f:
              f.write(f"KUDU_URL={sh_single_quote('https://' + publish_url)}\\n")
              f.write(f"KUDU_USER={sh_single_quote(username)}\\n")
              f.write(f"KUDU_PASS={sh_single_quote(password)}\\n")

          print(f"ZipDeploy endpoint: https://{publish_url}")
          PY

          source kudu_env.sh

          if [ ! -d publish ]; then
            echo "Publish output folder is missing."
            exit 1
          fi

          cd publish
          zip -r ../site.zip . >/dev/null
          cd ..

          echo "Zip package size: $(du -h site.zip | cut -f1)"

          echo "Submitting package to Kudu ZipDeploy..."
          DEPLOY_RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -u "$KUDU_USER:$KUDU_PASS" -X POST -H "Content-Type: application/zip" --data-binary @site.zip "$KUDU_URL/api/zipdeploy?isAsync=true")
          DEPLOY_HTTP=$(echo "$DEPLOY_RESPONSE" | sed -n 's/^HTTP_STATUS://p')
          DEPLOY_BODY=$(echo "$DEPLOY_RESPONSE" | sed '/^HTTP_STATUS:/d')

          echo "ZipDeploy submit HTTP=$DEPLOY_HTTP"
          if [ -z "$DEPLOY_HTTP" ] || [ "$DEPLOY_HTTP" -ge 400 ]; then
            echo "ZipDeploy submit failed. Response body:"
            echo "$DEPLOY_BODY"
            exit 1
          fi

          STATUS_URL=$(echo "$DEPLOY_BODY" | python3 - <<'PY'
          import json
          import sys

          data = sys.stdin.read().strip()
          if not data:
              print("")
              sys.exit(0)

          try:
              payload = json.loads(data)
              print(payload.get("status_url", ""))
          except Exception:
              print("")
          PY
          )

          if [ -z "$STATUS_URL" ]; then
            STATUS_URL="$KUDU_URL/api/deployments/latest"
          fi

          echo "Polling deployment status..."
          for i in {1..60}; do
            STATUS_RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -u "$KUDU_USER:$KUDU_PASS" "$STATUS_URL")
            STATUS_HTTP=$(echo "$STATUS_RESPONSE" | sed -n 's/^HTTP_STATUS://p')
            STATUS_JSON=$(echo "$STATUS_RESPONSE" | sed '/^HTTP_STATUS:/d')

            if [ -z "$STATUS_HTTP" ] || [ "$STATUS_HTTP" -ge 400 ]; then
              echo "Failed to query deployment status. HTTP=$STATUS_HTTP"
              echo "$STATUS_JSON"
              exit 1
            fi

            STATUS_CODE=$(echo "$STATUS_JSON" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("status", -1))')
            PROGRESS=$(echo "$STATUS_JSON" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("progress", ""))')
            echo "status=$STATUS_CODE progress=$PROGRESS"

            if [ "$STATUS_CODE" = "4" ]; then
              echo "Deployment succeeded."
              exit 0
            fi

            if [ "$STATUS_CODE" = "3" ]; then
              echo "Deployment failed. Fetching detailed logs..."
              DEPLOY_ID=$(echo "$STATUS_JSON" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("id", ""))')
              if [ -n "$DEPLOY_ID" ]; then
                curl -sS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/$DEPLOY_ID/log" || true
              else
                curl -sS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest/log" || true
              fi
              exit 1
            fi

            sleep 10
          done

          echo "Deployment timed out while waiting for completion."
          exit 1