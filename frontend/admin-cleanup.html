<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xóa dữ liệu trùng lặp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>🧹 Xóa dữ liệu người dùng trùng lặp</h2>
        
        <div class="alert alert-warning">
            <strong>⚠️ Cảnh báo:</strong> Chức năng này dành cho admin. Sẽ xóa các tài khoản trùng tên và giữ lại tài khoản đầu tiên.
        </div>

        <div class="card mb-3">
            <div class="card-header">
                <h5>Danh sách người dùng</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary mb-3" onclick="loadUsers()">🔄 Tải lại danh sách</button>
                <div id="usersList"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5>Xóa theo tên đăng nhập</h5>
            </div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="usernameToClean" placeholder="Nhập tên đăng nhập">
                    <button class="btn btn-danger" onclick="cleanDuplicates()">🗑️ Xóa trùng lặp</button>
                </div>
                <div id="cleanResult"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/NguoiDung`);
                const users = await response.json();
                
                // Đếm số lần xuất hiện của mỗi username
                const userCounts = {};
                users.forEach(user => {
                    userCounts[user.tenDangNhap] = (userCounts[user.tenDangNhap] || 0) + 1;
                });

                let html = '<table class="table table-striped"><thead><tr>';
                html += '<th>ID</th><th>Tên đăng nhập</th><th>Email</th><th>Vai trò</th><th>Trùng lặp</th>';
                html += '</tr></thead><tbody>';

                users.forEach(user => {
                    const isDuplicate = userCounts[user.tenDangNhap] > 1;
                    const rowClass = isDuplicate ? 'table-danger' : '';
                    html += `<tr class="${rowClass}">`;
                    html += `<td>${user.maNguoiDung}</td>`;
                    html += `<td>${user.tenDangNhap}</td>`;
                    html += `<td>${user.email || '-'}</td>`;
                    html += `<td>${user.vaiTro || '-'}</td>`;
                    html += `<td>${isDuplicate ? '⚠️ Có (' + userCounts[user.tenDangNhap] + ')' : '✅'}</td>`;
                    html += '</tr>';
                });

                html += '</tbody></table>';
                document.getElementById('usersList').innerHTML = html;
            } catch (error) {
                document.getElementById('usersList').innerHTML = 
                    '<div class="alert alert-danger">Lỗi: ' + error.message + '</div>';
            }
        }

        async function cleanDuplicates() {
            const username = document.getElementById('usernameToClean').value.trim();
            if (!username) {
                alert('Vui lòng nhập tên đăng nhập!');
                return;
            }

            if (!confirm(`Xác nhận xóa các bản ghi trùng lặp của tài khoản "${username}"?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/NguoiDung/duplicate/${username}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                
                document.getElementById('cleanResult').innerHTML = 
                    `<div class="alert alert-success">${result.message}</div>`;
                
                // Reload danh sách
                await loadUsers();
            } catch (error) {
                document.getElementById('cleanResult').innerHTML = 
                    `<div class="alert alert-danger">Lỗi: ${error.message}</div>`;
            }
        }

        // Load users khi trang vừa mở
        loadUsers();
    </script>
</body>
</html>
