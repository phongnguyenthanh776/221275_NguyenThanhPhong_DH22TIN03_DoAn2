<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Test API Connection</h2>
        
        <div class="card mb-3">
            <div class="card-header">Test 1: Lấy danh sách người dùng</div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="testGetUsers()">Test GET Users</button>
                <pre id="result1" class="mt-3"></pre>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header">Test 2: Đăng ký</div>
            <div class="card-body">
                <button class="btn btn-success" onclick="testRegister()">Test Register</button>
                <pre id="result2" class="mt-3"></pre>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header">Test 3: Đăng nhập</div>
            <div class="card-body">
                <button class="btn btn-warning" onclick="testLogin()">Test Login</button>
                <pre id="result3" class="mt-3"></pre>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function testGetUsers() {
            try {
                const response = await fetch(`${API_URL}/NguoiDung`);
                const data = await response.json();
                document.getElementById('result1').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result1').textContent = 'Error: ' + error.message;
            }
        }

        async function testRegister() {
            const testUser = {
                tenDangNhap: 'testuser' + Date.now(),
                email: 'test' + Date.now() + '@example.com',
                matKhau: '123456',
                vaiTro: 'User'
            };

            try {
                const response = await fetch(`${API_URL}/NguoiDung/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testUser)
                });
                const data = await response.json();
                document.getElementById('result2').textContent = 
                    'Status: ' + response.status + '\n' +
                    JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result2').textContent = 'Error: ' + error.message;
            }
        }

        async function testLogin() {
            const loginData = {
                tenDangNhap: 'user1',
                matKhau: '123456'
            };

            try {
                const response = await fetch(`${API_URL}/NguoiDung/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                const data = await response.json();
                document.getElementById('result3').textContent = 
                    'Status: ' + response.status + '\n' +
                    JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result3').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
