<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quản Lý Sức Khỏe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🏥 Quản Lý Sức Khỏe Thông Minh</a>
            <div>
                <a href="overview.html" class="btn btn-outline-light btn-sm me-2">📊 Tổng quan</a>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">🚪 Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-2">
                <div class="list-group sticky-top" style="top: 20px;">
                    <a href="#" class="list-group-item list-group-item-action active" onclick="showSection('profile')">
                        👤 Thông tin cá nhân
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showSection('health')">
                        📊 Chỉ số sức khỏe
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showSection('bmi')">
                        📈 Lịch sử BMI
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showSection('habits')">
                        🏃 Thói quen sinh hoạt
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showSection('menu')">
                        🍎 Thực đơn
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showSection('warnings')">
                        ⚠️ Cảnh báo
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" onclick="showSection('ai')">
                        🤖 Tư vấn AI
                    </a>
                </div>
            </div>
            <div class="col-md-10">
                <div id="content">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
