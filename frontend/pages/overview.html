<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan - Quản Lý Sức Khỏe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🏥 Tổng quan Sức khỏe</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">🚪 Đăng xuất</button>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-2">
                <div class="list-group sticky-top" style="top: 20px;">
                    <a href="overview.html" class="list-group-item list-group-item-action active">
                        📊 Tổng quan
                    </a>
                    <a href="dashboard.html" class="list-group-item list-group-item-action">
                        ⚙️ Quản lý chi tiết
                    </a>
                </div>
            </div>
            <div class="col-md-10">
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card bg-primary text-white">
                            <div class="card-body">
                                <h6>BMI hiện tại</h6>
                                <h2 id="currentBMI">--</h2>
                                <p id="bmiStatus">--</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-success text-white">
                            <div class="card-body">
                                <h6>Cân nặng</h6>
                                <h2 id="currentWeight">--</h2>
                                <p>kg</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-warning text-white">
                            <div class="card-body">
                                <h6>Huyết áp</h6>
                                <h2 id="currentBP">--</h2>
                                <p>mmHg</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-danger text-white">
                            <div class="card-body">
                                <h6>Đường huyết</h6>
                                <h2 id="currentGlucose">--</h2>
                                <p>mg/dL</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h5>📈 Biểu đồ BMI 30 ngày</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="bmiChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5>⚠️ Cảnh báo gần đây</h5>
                            </div>
                            <div class="card-body" id="recentWarnings">
                                <p class="text-muted">Đang tải...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>🍎 Gợi ý thực đơn hôm nay</h5>
                            </div>
                            <div class="card-body" id="todayMenu">
                                <button class="btn btn-primary" onclick="generateMenu()">
                                    🤖 Tạo thực đơn từ AI
                                </button>
                                <div id="menuResult" class="mt-3"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>🎯 Mục tiêu sức khỏe</h5>
                            </div>
                            <div class="card-body" id="healthGoals">
                                <div class="mb-3">
                                    <label>Mục tiêu cân nặng (kg)</label>
                                    <input type="number" class="form-control" id="targetWeight" placeholder="VD: 65">
                                </div>
                                <div class="mb-3">
                                    <label>Mục tiêu BMI</label>
                                    <input type="number" class="form-control" id="targetBMI" placeholder="VD: 22">
                                </div>
                                <button class="btn btn-success" onclick="saveGoals()">💾 Lưu mục tiêu</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/overview.js"></script>
</body>
</html>
