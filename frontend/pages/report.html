<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo Sức khỏe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; }
        }
        .report-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="no-print mb-3">
            <button class="btn btn-primary" onclick="window.print()">🖨️ In báo cáo</button>
            <button class="btn btn-secondary" onclick="window.close()">❌ Đóng</button>
        </div>

        <div class="report-header">
            <h2>📋 BÁO CÁO SỨC KHỎE CÁ NHÂN</h2>
            <p class="mb-0">Ngày tạo: <span id="reportDate"></span></p>
        </div>

        <div class="card mb-3">
            <div class="card-header bg-primary text-white">
                <h5>Thông tin cá nhân</h5>
            </div>
            <div class="card-body" id="personalInfo">
                <!-- Loaded by JS -->
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header bg-success text-white">
                <h5>Chỉ số sức khỏe gần đây</h5>
            </div>
            <div class="card-body" id="healthMetrics">
                <!-- Loaded by JS -->
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header bg-info text-white">
                <h5>Phân tích BMI</h5>
            </div>
            <div class="card-body" id="bmiAnalysis">
                <!-- Loaded by JS -->
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h5>Khuyến nghị từ AI</h5>
            </div>
            <div class="card-body" id="aiRecommendations">
                <!-- Loaded by JS -->
            </div>
        </div>

        <div class="mt-4 text-center no-print">
            <p class="text-muted">Hệ thống Quản lý Sức khỏe Thông minh - MSSV: 221275</p>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/report.js"></script>
</body>
</html>
